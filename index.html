<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Enabley Design System</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lexend',sans-serif;background:#f4f2f7;min-height:100vh;display:flex;align-items:center;justify-content:center}
.hero{text-align:center;padding:60px 40px}
.logo{font-size:48px;font-weight:700;background:linear-gradient(135deg,#9a2496,#4e2b6a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.sub{font-size:13px;color:#8195a3;letter-spacing:2px;text-transform:uppercase;margin-bottom:40px}
.cards{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.card{background:#fff;border-radius:16px;padding:32px 28px;width:240px;text-align:left;box-shadow:0 4px 16px rgba(154,36,150,.1);text-decoration:none;color:#3a3a3a;transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(154,36,150,.18)}
.card-icon{font-size:32px;margin-bottom:16px}
.card-title{font-size:16px;font-weight:700;margin-bottom:6px}
.card-desc{font-size:13px;color:#8195a3;line-height:1.6}
.card-link{display:inline-block;margin-top:16px;font-size:12px;color:#9a2496;font-weight:600;letter-spacing:.5px}
</style>
</head>
<body>
<div class="hero">
  <div class="logo">enabley↗</div>
  <div class="sub">Design System</div>
  <div class="cards">
    <a class="card" href="enabley-storybook.html">
      <div class="card-icon">📖</div>
      <div class="card-title">Storybook</div>
      <div class="card-desc">Full component library with interactive examples, variants, and code snippets.</div>
      <span class="card-link">View Storybook →</span>
    </a>
    <a class="card" href="enabley-dashboard.html">
      <div class="card-icon">🖥️</div>
      <div class="card-title">Dashboard</div>
      <div class="card-desc">Live dashboard demo built entirely with the Enabley design system components.</div>
      <span class="card-link">View Dashboard →</span>
    </a>
  </div>
</div>
</body>
</html>
